## Flipper Apps Catalog manifest for JAYX
## Submit via PR to: https://github.com/flipperdevices/flipper-application-catalog
## Target path in catalog repo:
##   applications/USB/jayx/manifest.yml
##
## After every release: update commit_sha to the tag/commit you want published.

sourcecode:
  type: git
  location:
    origin: https://github.com/contactjayclatty/JAYX.git
    ## Updated automatically after catalog-prep commit is pushed
    commit_sha: REPLACE_AFTER_PUSH
    subdir: apps/jayx

short_description: Live PC CPU/RAM/GPU stats, FPS, and system info over USB

description: "@README.md"
changelog: "@changelog.md"

screenshots:
  - screenshots/livestats.png
  - screenshots/fpscounter.png
  - screenshots/systeminfo.png
  - screenshots/MainMenu.png
  - screenshots/osinfo.png
  - screenshots/cpuinfo.png
  - screenshots/Aboutpage.png
  - screenshots/fpscounterNogame.png
